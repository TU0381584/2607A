# Offline training config for the CONGESTED / URLLC-preservation campaign.
#
# WHY THIS CONFIG EXISTS (diagnosed 2026-07-24): saclb_offline_campaign.yaml
# (the config actually used to train every checkpoint evaluated so far)
# pins max_ratio_cap == nominal_ratio for ALL THREE slices -- zero elastic
# ceiling headroom, by deliberate design (see that file's own comments).
# That means during training, an "accept" action's ceiling-nudge is
# clamped at nominal_ratio immediately and can never rise further -- the
# policy never experiences a ceiling that can actually move into headroom.
# saclb_campaign.yaml (the LIVE-evaluation config) has REAL headroom
# instead (embb 3->12, urllc 2->4, mmtc 2->3). Every checkpoint deployed
# live or offline-evaluated so far was therefore evaluated on ceiling
# dynamics it never saw during training -- a genuine train/eval mismatch,
# not just an unrelated calibration-philosophy difference.
#
# Fix: max_ratio_cap here is IDENTICAL to saclb_campaign.yaml's (12/4/3),
# so training and (live) evaluation share the same ceiling range. Every
# other parameter (B, Lmax, reward weights, episode length, arrivals) is
# unchanged from saclb_offline_campaign.yaml.
name: saclb_offline_congested_v1
random_seed: 256
paper_variant: paper2
B: 100
Lmax: 10

gnbs:
  - gnb_id: gnb-0
    prb_capacity: 100

slices:
  - slice_id: embb
    sst: 1
    sd: 16777215
    nominal_ratio: 3
    min_ratio_floor: 1
    max_ratio_cap: 12   # matches saclb_campaign.yaml (was 3 -- zero headroom)
    latency_budget_ms: 45
    loss_budget_pct: 2.0
    priority_weight: 3.5
    accept_reward: 1.0
    violation_penalty: 5.0
  - slice_id: urllc
    sst: 1
    sd: 1
    nominal_ratio: 2
    min_ratio_floor: 1
    max_ratio_cap: 4    # matches saclb_campaign.yaml (was 2 -- zero headroom)
    latency_budget_ms: 20
    loss_budget_pct: 0.5
    priority_weight: 5.0      # highest -- URLLC preserved first, by reward design
    accept_reward: 1.0
    violation_penalty: 8.0   # highest -- URLLC violations cost the most
  - slice_id: mmtc
    sst: 1
    sd: 2
    nominal_ratio: 2
    min_ratio_floor: 1
    max_ratio_cap: 3    # matches saclb_campaign.yaml (was 2 -- zero headroom)
    latency_budget_ms: 65
    loss_budget_pct: 3.5
    priority_weight: 0.3
    accept_reward: 1.0
    violation_penalty: 2.5

reward:
  congestion_coeff: 1.5
  lb_coeff: 1.0

arrivals:
  synthetic_arrivals_per_step: 2
  max_pending_per_step: 8
  ceiling_step_ratio: 1

episode:
  step_seconds: 5.0
  steps_per_episode: 60

qoe:
  reward:
    alpha: 1.0
    beta: 0.2
    gamma: 0.5
  lstm_hidden: 32
  window: 8
  max_staleness: 20
  mapper_checkpoint:
    urllc: qoe_oran_framework/results/qoe_mapper/qoe_mapper_urllc.pt
    embb: qoe_oran_framework/results/qoe_mapper/qoe_mapper_embb.pt
    mmtc: qoe_oran_framework/results/qoe_mapper/qoe_mapper_mmtc.pt
  iqx_coeffs:
    urllc: {alpha: 5.167748, beta: 9.999999, gamma: 44.904893, delta: 199.999999, epsilon: 0.000000}
    embb:  {alpha: 3.522951, beta: 0.425081, gamma: 0.000000, delta: 0.000000, epsilon: 199.999999}
    mmtc:  {alpha: 5.999999, beta: 9.999999, gamma: 0.000000, delta: 7.944624, epsilon: 0.000000}
