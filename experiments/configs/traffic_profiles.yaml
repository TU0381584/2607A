# Per-slice traffic profiles for the 3-UE / 3-slice campaign.
#
# Pinned once here, logged by the driver script on every start, and NEVER
# varied between arms (baseline/dqn_sla/a2c_sla/dqn_qoe/a2c_qoe) or between
# repeated runs of the same arm -- this file is the single source of truth
# for "what traffic was running" and is read by experiments/plots/ scripts
# for figure captions.
#
# Deliberately deterministic (fixed bitrate/packet-size/duty-cycle), not
# seeded-random: this is exogenous real network traffic generated by real
# iperf3 processes against a real UDP target, not the framework's internal
# synthetic admission-request stream (which IS seeded -- see mc_runner.py).
# Seed control for THIS campaign's reproducibility lives at the RL-policy /
# env level (base_seed per arm/rep), not at the traffic-shape level -- the
# traffic shape is a fixed, always-on background condition by design, same
# rationale as a real testbed's traffic generator profile in the papers.
#
# All traffic is DOWNLINK (iperf3 --reverse, target server -> UE) because
# the framework's real KPM signals of interest (avg_prbs_dl,
# dl_mac_buffer_occupation) are downlink-side counters (see
# PROJECT_HANDOFF_SUMMARY.md finding #3) -- uplink-only traffic would not
# exercise the DL scheduler contention this campaign needs to observe.
target_container: iperf3-target
target_ip: 172.22.0.50

slices:
  embb:
    ue_bind_ip: 192.168.100.2   # UE1, default netns
    port: 5201
    mode: sustained
    protocol: udp
    bitrate: 4M
    packet_len_bytes: 1200
    description: >
      Sustained high-throughput downlink stream, continuous for the
      duration of the run -- matches eMBB's "always pushing data" character
      (e.g. video/bulk transfer). RETUNED from an initial 15M: at 15M,
      real measured demand was ~26-34 PRB against this rig's calibrated
      cap=4 (out of B=100) -- a ~7-8x oversubscription so extreme that
      ceiling changes within [floor,cap] would barely move backlog at all
      (always-saturated regardless of policy), destroying the learning
      signal Phase 2/3 need. 4M targets demand in the ~1.5-2.5x-over-cap
      range instead (see Phase 1 contention-gate log for the re-measured
      value) -- enough for genuine, provable, POLICY-RESPONSIVE contention,
      not a degenerate always-maxed-out slice.

  urllc:
    ue_bind_ip: 192.168.102.2   # UE3, netns ue3ns
    port: 5202
    mode: sustained
    protocol: udp
    bitrate: 300K
    packet_len_bytes: 100
    description: >
      Small (100B), frequent (continuous, not bursty) low-latency-sensitive
      packets at low aggregate bitrate -- matches URLLC's "many small
      time-critical transactions" character, distinct from eMBB's bulk
      shape even though both are "continuous."

  mmtc:
    ue_bind_ip: 192.168.200.2   # UE2, netns ue2ns
    port: 5203
    mode: bursty
    protocol: udp
    bitrate: 50K
    packet_len_bytes: 80
    burst_seconds: 2
    idle_seconds: 6
    description: >
      Sparse periodic small-packet bursts (2s on / 6s off) -- matches
      mMTC's "many devices, infrequent tiny reports" character. Lowest
      aggregate demand of the three slices by design.

# iperf3-target container setup (for reference / re-creation if the
# container is ever removed): one iperf3 server instance per slice port,
# attached to the docker_open5gs core network so all 3 UEs' PDU sessions
# can reach it (verified: UE -> gNB -> UPF -> docker bridge -> this
# container, all within the existing demo-open5gs-public-net bridge, no
# host-level NAT/routing changes needed):
#   docker run -d --name iperf3-target --network demo-open5gs-public-net \
#     --ip 172.22.0.50 networkstatic/iperf3 -s
#   docker exec -d iperf3-target iperf3 -s -p 5202
#   docker exec -d iperf3-target iperf3 -s -p 5203
