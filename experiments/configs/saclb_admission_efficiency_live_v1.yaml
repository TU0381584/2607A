# Live-transferable offline training config for the admission-efficiency
# objective. Unlike saclb_admission_efficiency_v1.yaml (calibrated purely
# against ClosedLoopKpmSource's own synthetic scale, and found NOT to bind
# against real demand on this rig -- see CAMPAIGN_LOG.md's 2026-07-20 "Live
# testing" entry), this file uses saclb_campaign.yaml's OWN real,
# live-proven values for every field that affects state normalization or
# ceiling scale (Lmax, nominal_ratio, min_ratio_floor, max_ratio_cap) --
# EXACTLY, not approximately -- so a policy trained against this file's
# ClosedLoopKpmSource sees states on the same normalized scale
# (queue_len_norm = min(2.0, backlog/Lmax), itself what actually feeds the
# neural network -- see env.py's encode_state) that LiveKpmSource will
# produce, rather than an incompatible one.
#
# Only the ClosedLoopKpmSource-specific parameters that have NO live
# equivalent (mean_offered_ratio's implied oversubscription, backlog_capacity)
# are free to differ -- validated via a zero-training diagnostic sweep
# (see experiments/scripts/live_scale_diagnostic.py) before any training,
# same discipline as saclb_admission_efficiency_v1.yaml's own derivation.
#
# CRITICAL INVARIANT (same as every sibling config): slices: order (embb,
# urllc, mmtc) matches saclb_campaign.yaml.
name: saclb_admission_efficiency_live_v1
random_seed: 256
paper_variant: paper2
B: 100
Lmax: 10   # IDENTICAL to saclb_campaign.yaml -- the live-transferability requirement

gnbs:
  - gnb_id: gnb-0
    prb_capacity: 100

slices:
  - slice_id: embb
    sst: 1
    sd: 16777215
    nominal_ratio: 3
    min_ratio_floor: 1
    max_ratio_cap: 12   # IDENTICAL to saclb_campaign.yaml -- proven live on this rig
    latency_budget_ms: 45
    loss_budget_pct: 2.0
    priority_weight: 3.5
    accept_reward: 1.0
    violation_penalty: 5.0
  - slice_id: urllc
    sst: 1
    sd: 1
    nominal_ratio: 2
    min_ratio_floor: 1
    max_ratio_cap: 4    # IDENTICAL to saclb_campaign.yaml
    latency_budget_ms: 20
    loss_budget_pct: 0.5
    priority_weight: 5.0
    accept_reward: 1.0
    violation_penalty: 8.0
  - slice_id: mmtc
    sst: 1
    sd: 2
    nominal_ratio: 2
    min_ratio_floor: 1
    max_ratio_cap: 3    # IDENTICAL to saclb_campaign.yaml
    latency_budget_ms: 65
    loss_budget_pct: 3.5
    priority_weight: 0.3
    accept_reward: 1.0
    violation_penalty: 2.5

reward:
  congestion_coeff: 1.5
  lb_coeff: 1.0

arrivals:
  synthetic_arrivals_per_step: 2
  max_pending_per_step: 8
  ceiling_step_ratio: 1

episode:
  step_seconds: 5.0
  steps_per_episode: 60

qoe:
  reward:
    alpha: 1.0
    beta: 0.2   # unswept for this config -- see saclb_admission_efficiency_v1.yaml's own beta findings; not assumed to transfer
    gamma: 0.5
  lstm_hidden: 32
  window: 8
  max_staleness: 20
  mapper_checkpoint:
    urllc: qoe_oran_framework/results/qoe_mapper/qoe_mapper_urllc.pt
    embb: qoe_oran_framework/results/qoe_mapper/qoe_mapper_embb.pt
    mmtc: qoe_oran_framework/results/qoe_mapper/qoe_mapper_mmtc.pt
  iqx_coeffs:
    urllc: {alpha: 5.167748, beta: 9.999999, gamma: 44.904893, delta: 199.999999, epsilon: 0.000000}
    embb:  {alpha: 3.522951, beta: 0.425081, gamma: 0.000000, delta: 0.000000, epsilon: 199.999999}
    mmtc:  {alpha: 5.999999, beta: 9.999999, gamma: 0.000000, delta: 7.944624, epsilon: 0.000000}
